<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTS Calculation</title>
    <style>
        body { font-family: -apple-system, system-ui, sans-serif; padding: 20px; background-color: #f4f7f9; }
        .container { max-width: 400px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h3 { text-align: center; color: #0056b3; margin-bottom: 25px; }
        .input-section { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #e9ecef; }
        label { display: block; font-weight: bold; margin-bottom: 10px; font-size: 0.7rem; color: #495057; }
        .select-wrapper { display: flex; align-items: center; gap: 10px; }
        select { flex: 1; padding: 12px; border-radius: 8px; border: 2px solid #dee2e6; font-size: 0.9rem; appearance: none; background-color: white; }
        .output-list { display: flex; flex-direction: column; gap: 10px; }
        .output-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; background: #fff; border: 1px solid #edf2f7; border-radius: 8px; }
        .label-text { font-size: 0.7rem; font-weight: 500; color: #718096; }
        .time-text { font-family: monospace; font-size: 1.1rem; font-weight: 700; color: #2d3748; }
        .highlight { background: #ebf8ff; border-left: 4px solid #3182ce; }
        .highlight .time-text { color: #2b6cb0; }
    </style>
</head>
<body>

<div class="container">
    <h3>PTS Tool</h3>

    <div class="input-section">
        <label>REPORTING TIME (HH:MM)</label>
        <div class="select-wrapper">
            <select id="hourSelect"></select>
            <span>:</span>
            <select id="minSelect"></select>
        </div>
    </div>

    <div class="output-list">
        <div class="output-item"><span class="label-text">Sign Out (-65)</span> <span id="out15" class="time-text">00:00</span></div>
        <div class="output-item"><span class="label-text">Crew on Board (-50)</span> <span id="out30" class="time-text">00:00</span></div>
         <div class="output-item"><span class="label-text">Security Checks by (-42)</span> <span id="out38" class="time-text">00:00</span></div>
        <div class="output-item"><span class="label-text">Boarding (-35)</span> <span id="out45" class="time-text">00:00</span></div>
        <div class="output-item"><span class="label-text">Door Close (-6)</span> <span id="out74" class="time-text">00:00</span></div>
        <div class="output-item highlight"><span class="label-text">STD</span> <span id="out80" class="time-text">00:00</span></div>
    </div>
</div>

<script>
    const hDrop = document.getElementById('hourSelect');
    const mDrop = document.getElementById('minSelect');

    // 1. Populate Dropdowns (Immediate execution)
    function setup() {
        for (let i = 0; i < 24; i++) {
            let opt = document.createElement('option');
            opt.value = i;
            opt.textContent = i.toString().padStart(2, '0');
            hDrop.appendChild(opt);
        }
        for (let i = 0; i < 60; i += 5) {
            let opt = document.createElement('option');
            opt.value = i;
            opt.textContent = i.toString().padStart(2, '0');
            mDrop.appendChild(opt);
        }
    }

    // 2. Calculation Logic
    function calculate() {
        const h = parseInt(hDrop.value);
        const m = parseInt(mDrop.value);

        const updateField = (id, offset) => {
            let date = new Date();
            date.setHours(h, m + offset, 0);
            const displayH = date.getHours().toString().padStart(2, '0');
            const displayM = date.getMinutes().toString().padStart(2, '0');
            document.getElementById(id).textContent = `${displayH}:${displayM}`;
        };

        updateField('out15', 15);
        updateField('out30', 30);
        updateField('out38', 38);
        updateField('out45', 45);
        updateField('out74', 74);
        updateField('out80', 80);
    }

    // 3. Event Listeners
    hDrop.addEventListener('change', calculate);
    mDrop.addEventListener('change', calculate);

    // Initial Run
    setup();
    calculate();
</script>

</body>
</html>
